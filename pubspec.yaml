name: pdv_system
description: Lotus PDV - A professional Point of Sale (POS) system built with Flutter for Windows.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # UI Components
  google_fonts: ^8.0.2
  
  # Date and time pickers
  intl: ^0.19.0
  
  # File handling
  file_picker: ^6.0.0
  image_picker: ^1.0.0
  
  # Image processing
  image: ^4.0.0
  
  # CSV handling for spreadsheets
  csv: ^5.1.0
  
  # Local storage
  path_provider: ^2.1.0
  
  # Database (SQLite for local persistence)
  sqflite: ^2.3.0
  
  # HTTP for future API integrations
  http: ^1.1.0
  
  # Notifications
  flutter_local_notifications: ^15.0.0
  
  # Printing
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # Icons and animations
  flutter_animate: ^4.2.0
  
  # Barcode scanning (optional, for future enhancement)
  qr_code_scanner: ^1.0.0
  
  # UUID generation
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/logo/logo.png
    - assets/data/
